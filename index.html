<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8">
  <title>AI旅行规划助手</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container-fluid py-3">
  <div class="row mb-3">
    <div class="col-12 d-flex justify-content-between align-items-center">
      <h1 class="h4 mb-0">AI旅行规划助手</h1>
      <div class="d-flex gap-2 align-items-center">
        <span class="badge bg-primary">Beta</span>
        <select id="languageToggle" class="form-select form-select-sm w-auto">
          <option value="zh" selected>中文</option>
          <option value="en">English</option>
        </select>
      </div>
    </div>
  </div>

  <div class="row g-3">
    <div class="col-lg-4">
      <div class="card mb-3">
        <div class="card-header"><strong id="tripSettingsTitle">行程需求</strong></div>
        <div class="card-body">
          <div class="mb-2">
            <label for="startLocationInput" id="startLocationLabel" class="form-label">出发地点</label>
            <input id="startLocationInput" type="text" class="form-control" placeholder="例如：东京站 / Tokyo Station">
          </div>
          <div class="row mb-2">
            <div class="col-6">
              <label for="startDateTime" id="startTimeLabel" class="form-label">出发时间</label>
              <input id="startDateTime" type="datetime-local" class="form-control" />
            </div>
            <div class="col-6">
              <label for="endDateTime" id="endTimeLabel" class="form-label">结束时间</label>
              <input id="endDateTime" type="datetime-local" class="form-control" />
            </div>
          </div>
        </div>
      </div>

      <div class="card mb-3">
        <div class="card-header d-flex justify-content-between align-items-center">
          <strong id="sitesTitle">景点列表</strong>
          <button id="clearSitesBtn" class="btn btn-outline-danger btn-sm">清空</button>
        </div>
        <div class="card-body">
          <div class="mb-2">
            <label for="siteNameInput" id="siteNameLabel" class="form-label">景点名称</label>
            <input id="siteNameInput" type="text" class="form-control" placeholder="例如：浅草寺 / Senso-ji">
          </div>
          <div class="mb-2">
            <label for="sitePreferredTime" id="preferredTimeLabel" class="form-label">推荐时间段</label>
            <select id="sitePreferredTime" class="form-select">
              <option value="any">不限 / Any time</option>
              <option value="morning">上午 / Morning</option>
              <option value="afternoon">下午 / Afternoon</option>
              <option value="evening">傍晚/夜景 / Evening</option>
            </select>
          </div>
          <button id="addSiteFromMapBtn" class="btn btn-secondary btn-sm mb-2 w-100">以当前地图中心添加景点</button>
          <ul id="sitesList" class="list-group small"></ul>
        </div>
      </div>

      <div class="d-grid mb-3">
        <button id="planRouteBtn" class="btn btn-primary">生成最佳路线与行程</button>
      </div>
    </div>

    <div class="col-lg-8">
      <div class="card mb-3">
        <div class="card-header"><strong id="mapTitle">地图与路线</strong></div>
        <div class="card-body p-0">
          <div id="map"></div>
        </div>
      </div>
      <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
          <strong id="itineraryTitle">日程安排</strong>
          <span id="summaryBadge" class="badge bg-secondary"></span>
        </div>
        <div class="card-body">
          <div id="itineraryContainer" class="small"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script type="module" src="data.js"></script>
<script type="module" src="app.js"></script>
</body>
</html>
